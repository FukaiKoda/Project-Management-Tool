services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: trello_api
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - /app/node_modules
    secrets:
      - session_secret
      - google_client_id
      - google_client_secret
      - github_client_id
      - github_client_secret
    environment:
      - PORT=5000
      - HOST=http://localhost
      - REDIS_URL=redis://redis:6379
      - POSTGRES=postgresql://postgres@postgres:5432/postgres
    depends_on:
      - postgres
      - redis
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    container_name: trello_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: postgres
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trello_redis
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:

secrets:
  session_secret:
    file: ./secrets/session_secret.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt
  github_client_id:
    file: ./secrets/github_client_id.txt
  github_client_secret:
    file: ./secrets/github_client_secret.txt
  db_password:
    file: ./secrets/db_password.txt